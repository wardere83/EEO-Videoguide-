<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EEO Video Guide</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 2rem;
    }
    main {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p.tagline {
      color: #94a3b8;
      font-size: 1.1rem;
      margin: 0 0 2rem;
    }
    .video-wrap {
      position: relative;
      padding-top: 56.25%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #334155;
    }
    .video-wrap iframe {
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
    }
    footer { margin-top: 2rem; color: #64748b; font-size: 0.875rem; }
  </style>
</head>
<body>
  <main>
    <h1>EEO Video Guide</h1>
    <p class="tagline">EEO IBP Grant Initiative</p>
    <div class="video-wrap">
      <iframe
        src="https://customer-cd6q9846m6243pi2.cloudflarestream.com/390557b908b51626b552499f7799ac96/iframe?poster=https%3A%2F%2Fcustomer-cd6q9846m6243pi2.cloudflarestream.com%2F390557b908b51626b552499f7799ac96%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
        loading="lazy"
        allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
        allowfullscreen="true">
      </iframe>
    </div>
    <footer>eeodashboard.io</footer>
  </main>
</body>
</html>
