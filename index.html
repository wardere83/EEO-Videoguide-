<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EEO Video Guide</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 2rem;
    }
    main {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p.tagline {
      color: #94a3b8;
      font-size: 1.1rem;
      margin: 0 0 2rem;
    }
    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #334155;
    }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    footer { margin-top: 2rem; color: #64748b; font-size: 0.875rem; }
  </style>
</head>
<body>
  <main>
    <h1>EEO Video Guide</h1>
    <p class="tagline">EEO IBP Grant Initiative</p>
    <div class="video-wrap">
      <video controls preload="metadata" playsinline>
        <source src="058C78C5-4B8F-406E-BD92-B807746517CF.MOV" type="video/quicktime">
        Your browser does not support embedded video. You can
        <a href="058C78C5-4B8F-406E-BD92-B807746517CF.MOV">download the video</a> instead.
      </video>
    </div>
    <footer>eeodashboard.io</footer>
  </main>
</body>
</html>
